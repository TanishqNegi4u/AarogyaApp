version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: aarogyaNet
      POSTGRES_USER: aarogyaNet_user
      POSTGRES_PASSWORD: aarogyaNet_pass
    ports:
      - "5432:5432"

  backend:
    build: .
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/aarogyaNet
      DB_USERNAME: aarogyaNet_user
      DB_PASSWORD: aarogyaNet_pass
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend