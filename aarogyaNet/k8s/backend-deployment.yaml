apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: aarogyaNet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: aarogyaNet-backend:latest
        ports:
        - containerPort: 8080
        envFrom:
        - configMapRef:
            name: aarogyaNet-config
        env:
        - name: DB_PASSWORD
          value: aarogyaNet_pass
        - name: JWT_SECRET
          value: AarogyaNetSecretKey2024India
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: aarogyaNet
spec:
  selector:
    app: backend
  ports:
  - port: 8080
    targetPort: 8080