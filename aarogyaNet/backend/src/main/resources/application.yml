spring:
  application:
    name: AarogyaNet
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/aarogyaNet}
    username: ${DB_USERNAME:aarogyaNet_user}
    password: ${DB_PASSWORD:aarogyaNet_pass}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

jwt:
  secret: ${JWT_SECRET:AarogyaNetSecretKey2024IndiaHealthcare}
  expiration: 86400000
  refresh-expiration: 604800000

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics